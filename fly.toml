# fly.toml app configuration file generated for catnode-universe on 2026-04-22T16:24:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'catnode-universe'
primary_region = 'lax'

[build]

[http_service]
  internal_port = 443
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
